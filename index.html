<!DOCTYPE html>
<!--
  index.html — the structure of the page.
  HTML describes WHAT is on the page (headings, forms, lists).
  The styling lives in style.css and the behavior lives in app.js.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>🏋️ Fitness Tracker</h1>
    <p class="subtitle">Log your workouts and track your progress.</p>

    <!-- Summary cards: filled in by app.js -->
    <section class="stats">
      <div class="stat-card">
        <span class="stat-number" id="totalWorkouts">0</span>
        <span class="stat-label">Total workouts</span>
      </div>
      <div class="stat-card">
        <span class="stat-number" id="weekMinutes">0</span>
        <span class="stat-label">Minutes this week</span>
      </div>
      <div class="stat-card">
        <span class="stat-number" id="weekWorkouts">0</span>
        <span class="stat-label">Workouts this week</span>
      </div>
    </section>

    <!-- The form for adding a new workout -->
    <section class="card">
      <h2>Add a workout</h2>
      <form id="workoutForm">
        <div class="field">
          <label for="exercise">Exercise</label>
          <input type="text" id="exercise" placeholder="e.g. Running, Bench press" required />
        </div>

        <div class="row">
          <div class="field">
            <label for="duration">Duration (minutes)</label>
            <input type="number" id="duration" min="1" placeholder="30" required />
          </div>
          <div class="field">
            <label for="date">Date</label>
            <input type="date" id="date" required />
          </div>
        </div>

        <div class="field">
          <label for="notes">Notes (optional)</label>
          <input type="text" id="notes" placeholder="How did it feel?" />
        </div>

        <button type="submit">Add workout</button>
      </form>
    </section>

    <!-- The list of logged workouts -->
    <section class="card">
      <h2>Your workouts</h2>
      <ul id="workoutList" class="workout-list"></ul>
      <p id="emptyMessage" class="empty">No workouts logged yet. Add your first one above! 💪</p>
    </section>
  </main>

  <!-- The behavior. Loaded last so the page exists before the script runs. -->
  <script src="app.js"></script>
</body>
</html>
